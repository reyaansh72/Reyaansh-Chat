name: 🚀 Build & Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: 🐦 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 📦 Get packages
        run: flutter pub get

      - name: 🌐 Build Web
        run: flutter build web --release

      - name: 🤖 Build Android APK
        run: flutter build apk --release

      - name: 📁 Package artifacts
        run: |
          mkdir artifacts

          cd build/web
          zip -r ../../artifacts/Reyaansh-Chat-Web.zip .
          cd ../..

          cp build/app/outputs/flutter-apk/app-release.apk \
             artifacts/Reyaansh-Chat-Android.apk

      - name: 🏷 Generate next version
        id: version
        run: |
          #!/usr/bin/env bash
          set -euo pipefail

          git fetch --tags

          # Get the highest existing version (strip leading "v").
          # Supports tags like v1.0, v1.1, v1.2.3 etc.
          LAST_TAG=$(git tag -l "v*" | sed 's/^v//' | sort -V | tail -n 1 || true)

          if [ -z "$LAST_TAG" ]; then
            NEXT="1"
          else
            # Split version into components and increment the last numeric component
            IFS='.' read -r -a parts <<< "$LAST_TAG"
            last_index=$(( ${#parts[@]} - 1 ))

            # Ensure the last part is numeric; if not, fallback to appending .1
            if [[ "${parts[$last_index]}" =~ ^[0-9]+$ ]]; then
              parts[$last_index]=$(( parts[$last_index] + 1 ))
              # Rejoin parts with dots
              NEXT=$(IFS=.; echo "${parts[*]}")
            else
              # Non-numeric last part -> just append ".1"
              NEXT="${LAST_TAG}.1"
            fi
          fi

          TAG="v$NEXT"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # If the tag already exists (race / repeated runs), skip creating it to avoid failing the job
          if git rev-parse --verify --quiet "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists; skipping tag creation."
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/Reyaansh-Chat-Web.zip
            artifacts/Reyaansh-Chat-Android.apk

      - name: 📤 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          cname: reyaansh-chat.github.io
